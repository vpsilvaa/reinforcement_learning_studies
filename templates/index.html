<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IA Autonomous Drive v1.0</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --bg-dark: #0a0b10;
        }

        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-blue);
            padding: 10px 20px;
            border-radius: 8px;
            min-width: 120px;
        }

        .stat-value {
            font-size: 1.2em;
            color: var(--neon-blue);
            font-weight: bold;
        }

        canvas { 
            background: radial-gradient(circle, #1a1c2c 0%, #0a0b10 100%);
            border: 2px solid #1e213a;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            margin-top: 20px;
            border-radius: 4px;
        }

        #status-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            background: var(--neon-red);
            margin-right: 8px;
            box-shadow: 0 0 10px var(--neon-red);
        }

        .connected #status-light {
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }
    </style>
</head>
<body>
    <div class="header" id="header-container">
        <div>
            <div id="status-light"></div>
            <span id="status-text">SYSTEM OFFLINE</span>
        </div>
        <h1 style="margin: 0; font-size: 1.5em; letter-spacing: 4px;">AUTONOMOUS AI CAR</h1>
        <div class="dashboard">
            <div class="stat-card">VELOCIDADE: <span id="speed-val" class="stat-value">0</span> km/h</div>
            <div class="stat-card">X: <span id="pos-x" class="stat-value">0</span></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const socket = io();

        socket.on('connect', () => {
            document.getElementById('header-container').classList.add('connected');
            document.getElementById('status-text').innerText = "SYSTEM ONLINE";
        });

        socket.on('update_car', (data) => {
            document.getElementById('speed-val').innerText = (data.speed * 20).toFixed(1);
            document.getElementById('pos-x').innerText = Math.floor(data.x);
            draw(data);
        });

        function draw(data) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // grama de fundo
            ctx.fillStyle = "#7db152";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // estrada dinâmica baseada nos checkpoints do python
            if (data.checkpoints && data.checkpoints.length > 0) {
                ctx.strokeStyle = "#555";
                ctx.lineWidth = 90; // Largura da pista
                ctx.lineJoin = "round";
                ctx.lineCap = "round";
                ctx.beginPath();
                
                // move para o primeiro checkpoint
                ctx.moveTo(data.checkpoints[0].x, data.checkpoints[0].y);
                
                // desenha a linha passando por todos os checkpoints
                data.checkpoints.forEach((ckpt) => {
                    ctx.lineTo(ckpt.x, ckpt.y);
                });
                ctx.stroke();

                // linha central pontilhada
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.lineWidth = 2;
                ctx.setLineDash([20, 20]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // prédios
            data.obstacles.forEach((obs, i) => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.fillStyle = i % 2 === 0 ? "#b38b6d" : "#8d99ae";
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                
                // detalhe de telhado
                ctx.fillStyle = "rgba(0,0,0,0.1)";
                ctx.fillRect(obs.x + 5, obs.y + 5, obs.w - 10, obs.h - 10);
                ctx.shadowBlur = 0;
            });

            // próximo checkpoint
            ctx.fillStyle = "rgba(255, 255, 0, 0.7)";
            ctx.beginPath();
            ctx.arc(data.goal.x, data.goal.y, 15, 0, Math.PI * 2);
            ctx.fill();

            // sensores (Lidar)
            ctx.strokeStyle = "rgba(0, 255, 255, 0.2)";
            const angles = [-60, -30, 0, 30, 60];
            data.sensors.forEach((s, i) => {
                const dist = s * 500;
                const angle = (data.angle + angles[i]) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(data.x, data.y);
                ctx.lineTo(data.x + Math.cos(angle) * dist, data.y - Math.sin(angle) * dist);
                ctx.stroke();
            });

            // carro
            ctx.save();
            ctx.translate(data.x, data.y);
            ctx.rotate(-data.angle * Math.PI / 180);
            
            // sombra do carro
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.fillRect(-18, -10, 40, 24);

            // corpo
            ctx.fillStyle = "#2a9d8f"; 
            ctx.roundRect(-20, -12, 40, 24, 5);
            ctx.fill();

            // parabrisa
            ctx.fillStyle = "#ade8f4";
            ctx.fillRect(5, -10, 8, 20);
            
            ctx.restore();
        }
    </script>
</body>
</html>
